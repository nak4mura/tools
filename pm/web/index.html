<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>山積み表ツール</title>
  <link rel="stylesheet" href="css/app.css">
</head>
<body>
  <div id="app">

    <header id="app-header">
      <h1>山積み表ツール</h1>
      <div class="header-tools">
        <button class="btn btn-secondary" id="btn-export">エクスポート (JSON)</button>
        <label class="btn btn-secondary" style="cursor:pointer">
          インポート (JSON)
          <input type="file" id="import-file" accept=".json" style="display:none">
        </label>
      </div>
    </header>

    <nav id="tab-nav" role="tablist" aria-label="ビュー切り替え"></nav>

    <main id="app-content" role="tabpanel"></main>

  </div>

  <!-- 依存順にロード（type="module" 不使用 → file:// で動作） -->
  <script src="js/constants.js"></script>
  <script src="js/holiday.js"></script>
  <script src="js/calc.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/store.js"></script>
  <script src="js/render.js"></script>
  <script src="js/views/master-process.js"></script>
  <script src="js/views/master-member.js"></script>
  <script src="js/views/master-holiday.js"></script>
  <script src="js/views/master-config.js"></script>
  <script src="js/views/main-input.js"></script>
  <script src="js/views/summary-member.js"></script>
  <script src="js/views/summary-process.js"></script>
  <script src="js/views/gantt.js"></script>
  <script src="js/views/dashboard.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
