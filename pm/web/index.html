<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>山積み表ツール</title>
  <link rel="stylesheet" href="css/app.css">
</head>
<body>
  <div id="app">

    <header id="app-header">
      <h1>山積み表ツール</h1>
      <div class="header-tools">
        <button class="btn btn-secondary" id="btn-export">エクスポート (JSON)</button>
        <label class="btn btn-secondary" style="cursor:pointer">
          インポート (JSON)
          <input type="file" id="import-file" accept=".json" style="display:none">
        </label>
      </div>
    </header>

    <nav id="tab-nav" role="tablist" aria-label="ビュー切り替え">
      <!-- タブボタンはapp.jsで動的生成 -->
    </nav>

    <main id="app-content" role="tabpanel">
      <!-- ビューコンテンツはapp.jsで動的レンダリング -->
    </main>

  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
